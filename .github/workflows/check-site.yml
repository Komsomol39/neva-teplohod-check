name: Check Bitrix24 Button

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Check site HTML
        run: |
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml" \
            -H "Accept-Language: ru-RU,ru;q=0.9" \
            "https://neva-teplohod.ru/" > page.html
          echo "Page size: $(wc -c < page.html) bytes"

      - name: Analyze button and script
        run: |
          python3 << 'EOF'
          with open("page.html", "r", encoding="utf-8", errors="replace") as f:
              html = f.read()

          import re

          print("=" * 50)
          print("1. СКРИПТ БИТРИКС24")
          print("=" * 50)
          has_loader = "loader_79" in html
          has_cdn = "cdn-ru.bitrix24.ru" in html
          print(f"  loader_79.js в HTML: {has_loader}")
          print(f"  cdn-ru.bitrix24.ru в HTML: {has_cdn}")

          print()
          print("=" * 50)
          print("2. КНОПКА #open-b24-form")
          print("=" * 50)
          # Ищем элемент с id=open-b24-form
          btn_id = re.findall(r'<[^>]*id=["\']?open-b24-form["\']?[^>]*>', html)
          print(f"  Найдено элементов с id=open-b24-form: {len(btn_id)}")
          for b in btn_id:
              print(f"  -> {b[:300]}")

          print()
          print("=" * 50)
          print("3. ВСЕ КНОПКИ ОСТАВИТЬ ЗАЯВКУ")
          print("=" * 50)
          # Ищем все ссылки/кнопки с текстом
          btns = re.findall(r'<a[^>]*>(?:[^<]|<(?!/?a))*?[Оо]ставить заявку(?:[^<]|<(?!/?a))*?</a>', html, re.DOTALL)
          print(f"  Найдено кнопок-ссылок: {len(btns)}")
          for i, b in enumerate(btns):
              clean = re.sub(r'\s+', ' ', b).strip()
              print(f"  Кнопка {i+1}: {clean[:400]}")

          print()
          print("=" * 50)
          print("4. ВТОРОЙ СКРИПТ (обработчик клика)")
          print("=" * 50)
          scripts = re.findall(r'<script[^>]*>(.*?)</script>', html, re.DOTALL)
          for i, s in enumerate(scripts):
              if "open-b24-form" in s or "openForm" in s or "DOMContentLoaded" in s:
                  print(f"  Script #{i+1}:")
                  print(s.strip()[:600])
                  print()

          print()
          print("=" * 50)
          print("5. ДИАГНОЗ")
          print("=" * 50)
          has_handler = any("open-b24-form" in s or "openForm" in s for s in scripts)
          has_btn_id = len(btn_id) > 0
          
          # Проверяем href кнопок
          href_hash = any('href="#"' in b or "href=\'#\')" in b for b in btns)
          
          if not has_loader:
              print("  ПРОБЛЕМА: скрипт загрузчика Битрикс24 не найден!")
          elif not has_btn_id:
              print("  ПРОБЛЕМА: кнопка с id=open-b24-form не найдена!")
              print("  Elementor, возможно, не опубликовал изменения.")
          elif not has_handler:
              print("  ПРОБЛЕМА: обработчик клика (второй скрипт) не найден!")
          else:
              print("  Всё на месте. Проблема может быть в порядке загрузки скриптов.")
              print("  Битрикс24 loader может грузиться после DOMContentLoaded.")
          
          if btns:
              first_btn = btns[0]
              if 'href="#"' in first_btn:
                  print("  ПРОБЛЕМА: href='#' вызывает скролл вверх/вниз страницы!")
                  print("  Нужно заменить на href='javascript:void(0)'")
          'EOF'

      - name: Upload page snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: page-snapshot
          path: page.html
