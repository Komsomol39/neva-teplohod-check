name: Debug Bitrix24 Form with Puppeteer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Run debug script
        run: |
          node << 'JSEOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            const logs = [];
            const log = (msg) => { console.log(msg); logs.push(msg); };

            page.on('console', msg => log('BROWSER ' + msg.type() + ': ' + msg.text()));
            page.on('pageerror', err => log('PAGEERROR: ' + err.message));

            await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36');
            
            log('Opening page...');
            await page.goto('https://neva-teplohod.ru/', {waitUntil: 'networkidle2', timeout: 60000});
            await new Promise(r => setTimeout(r, 4000));

            const result = await page.evaluate(() => {
              const buttons = Array.from(document.querySelectorAll('a, button')).filter(el => 
                (el.innerText || '').includes('Оставить заявку')
              ).map(el => ({
                tag: el.tagName,
                href: el.href || el.getAttribute('href'),
                id: el.id,
                dataB24: el.getAttribute('data-b24-form'),
                outerHTML: el.outerHTML.slice(0, 300)
              }));

              const b24scripts = Array.from(document.querySelectorAll('script')).filter(s =>
                s.getAttribute('data-b24-form') || 
                (s.textContent && s.textContent.includes('bitrix24'))
              ).map(s => ({
                dataB24: s.getAttribute('data-b24-form'),
                preview: s.textContent ? s.textContent.slice(0, 300) : null
              }));

              return {
                b24formExists: typeof window.b24form !== 'undefined',
                b24formKeys: window.b24form ? Object.keys(window.b24form) : [],
                b24AppExists: window.b24form && window.b24form.App ? true : false,
                buttons,
                b24scripts,
                b24elements: Array.from(document.querySelectorAll('[data-b24-form]')).map(el => ({
                  tag: el.tagName,
                  value: el.getAttribute('data-b24-form'),
                  b24formProp: typeof el.b24form
                }))
              };
            });

            log('\n=== РЕЗУЛЬТАТ ===');
            log('b24form загружен: ' + result.b24formExists);
            log('b24form.App есть: ' + result.b24AppExists);
            log('b24form ключи: ' + JSON.stringify(result.b24formKeys));
            log('\n--- Кнопки Оставить заявку (' + result.buttons.length + ') ---');
            result.buttons.forEach((b,i) => log('  ' + (i+1) + ') ' + JSON.stringify(b)));
            log('\n--- Элементы с data-b24-form ---');
            result.b24elements.forEach((e,i) => log('  ' + (i+1) + ') ' + JSON.stringify(e)));
            log('\n--- Скрипты Битрикс24 ---');
            result.b24scripts.forEach((s,i) => log('  ' + (i+1) + ') dataB24=' + s.dataB24 + ' | ' + (s.preview||'').slice(0,150)));

            fs.writeFileSync('debug-result.txt', logs.join('\n'));
            await browser.close();
          })();
          JSEOF

      - name: Save results to repo
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add debug-result.txt
          git commit -m "debug result $(date)" || echo "nothing to commit"
          git push
