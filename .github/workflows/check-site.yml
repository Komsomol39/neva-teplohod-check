name: Debug Bitrix24 Form with Puppeteer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Run debug script
        run: |
          node << 'JSEOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            const logs = [];
            const log = (msg) => { console.log(msg); logs.push(String(msg)); };

            page.on('console', msg => log('BROWSER: ' + msg.text()));
            page.on('pageerror', err => log('PAGEERROR: ' + err.message));

            await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36');
            await page.goto('https://neva-teplohod.ru/', {waitUntil: 'networkidle2', timeout: 60000});
            await new Promise(r => setTimeout(r, 5000));

            const result = await page.evaluate(() => {
              // Проверяем все скрипты в footer
              const allScripts = Array.from(document.querySelectorAll('script')).map(s => ({
                dataB24: s.getAttribute('data-b24-form'),
                preview: (s.textContent || '').slice(0, 400)
              })).filter(s => s.dataB24 || s.preview.includes('b24') || s.preview.includes('Оставить') || s.preview.includes('b24form'));

              // Кнопки
              const buttons = Array.from(document.querySelectorAll('a.elementor-button')).filter(el =>
                (el.innerText || '').includes('Оставить заявку')
              ).map(el => ({
                href: el.getAttribute('href'),
                onclick: el.getAttribute('onclick'),
                hasOnclick: typeof el.onclick === 'function',
                id: el.id
              }));

              // Проверяем window объекты
              const b24keys = window.b24form ? Object.keys(window.b24form) : [];
              const appMethods = (window.b24form && window.b24form.App) 
                ? Object.getOwnPropertyNames(Object.getPrototypeOf(window.b24form.App.create({type:'click',id:'79',sec:'sey0y6'})))
                : [];

              return { allScripts, buttons, b24keys, appMethods };
            });

            log('
=== СКРИПТЫ С b24 ===');
            result.allScripts.forEach((s,i) => {
              log('Script ' + (i+1) + ':');
              log('  dataB24: ' + s.dataB24);
              log('  preview: ' + s.preview.replace(/
/g,' ').slice(0,300));
            });

            log('
=== КНОПКИ ===');
            result.buttons.forEach((b,i) => {
              log('Button ' + (i+1) + ': href=' + b.href + ' | onclick attr=' + b.onclick + ' | onclick func=' + b.hasOnclick + ' | id=' + b.id);
            });

            log('
=== APP METHODS ===');
            log(JSON.stringify(result.appMethods));

            // Пробуем кликнуть кнопку и смотрим что происходит
            log('
=== КЛИК ПО КНОПКЕ ===');
            const clickResult = await page.evaluate(() => {
              const btn = Array.from(document.querySelectorAll('a.elementor-button'))
                .find(el => (el.innerText||'').includes('Оставить заявку'));
              if (!btn) return 'NO BUTTON';
              
              // Проверяем слушателей через клонирование
              const errors = [];
              try {
                btn.click();
              } catch(e) {
                errors.push(e.message);
              }
              
              // Проверяем что открылось
              setTimeout(() => {}, 1000);
              const modal = document.querySelector('.b24-form-wrapper, .b24-form, [class*="b24"], .bx-crm-form');
              return {
                btnHref: btn.getAttribute('href'),
                btnOnclick: btn.getAttribute('onclick'),
                modalFound: modal ? modal.className : null,
                errors
              };
            });
            log(JSON.stringify(clickResult));

            await new Promise(r => setTimeout(r, 2000));

            // Проверяем появился ли попап после клика
            const afterClick = await page.evaluate(() => {
              const modals = document.querySelectorAll('[class*="b24-form"], [class*="bx24-form"], [id*="b24-form"]');
              const visible = Array.from(modals).filter(m => {
                const style = window.getComputedStyle(m);
                return style.display !== 'none' && style.visibility !== 'hidden';
              });
              return {
                totalModals: modals.length,
                visibleModals: visible.map(m => m.className + ' | display:' + window.getComputedStyle(m).display)
              };
            });
            log('
=== ПОПАП ПОСЛЕ КЛИКА ===');
            log(JSON.stringify(afterClick));

            fs.writeFileSync('debug-result.txt', logs.join('
'));
            await browser.close();
          })();
          JSEOF

      - name: Save results to repo
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add debug-result.txt
          git diff --staged --quiet || git commit -m "debug $(date +%s)"
          git push
