name: Check Bitrix24 Button

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install wget + try multiple methods
        run: |
          # Метод 1: wget с куками и полными заголовками
          wget -q --no-check-certificate \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            --header="Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            --header="Accept-Language: ru-RU,ru;q=0.9,en;q=0.8" \
            --header="Accept-Encoding: gzip, deflate, br" \
            --header="Connection: keep-alive" \
            --header="Upgrade-Insecure-Requests: 1" \
            -O page.html "https://neva-teplohod.ru/" 2>&1 || true
          
          SIZE=$(wc -c < page.html 2>/dev/null || echo 0)
          echo "Method 1 (wget) size: $SIZE"
          
          if [ "$SIZE" -lt 1000 ]; then
            echo "wget failed, trying curl with random IP..."
            curl -s -L --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (X11; Ubuntu; Linux x86_64; rv:124.0) Gecko/20100101 Firefox/124.0" \
              -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8" \
              -H "Accept-Language: ru-RU,ru;q=0.8,en-US;q=0.5,en;q=0.3" \
              -H "Accept-Encoding: gzip, deflate, br" \
              -H "DNT: 1" \
              -H "Connection: keep-alive" \
              -H "Upgrade-Insecure-Requests: 1" \
              --compressed \
              "https://neva-teplohod.ru/" -o page.html || true
            echo "Method 2 (curl Firefox UA) size: $(wc -c < page.html)"
          fi

      - name: Check HTTP status
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://neva-teplohod.ru/")
          echo "HTTP Status: $STATUS"
          
          # Посмотрим заголовки ответа
          curl -s -I \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://neva-teplohod.ru/" | head -20

      - name: Analyze if page loaded
        run: |
          SIZE=$(wc -c < page.html 2>/dev/null || echo 0)
          echo "Final page size: $SIZE bytes"
          
          if [ "$SIZE" -gt 5000 ]; then
            python3 << 'PYEOF'
          with open("page.html", "r", encoding="utf-8", errors="replace") as f:
              html = f.read()
          import re

          print("=" * 50)
          print("СКРИПТ БИТРИКС24:", "НАЙДЕН" if "loader_79" in html else "НЕ НАЙДЕН")
          print("cdn-ru.bitrix24.ru:", "НАЙДЕН" if "cdn-ru.bitrix24.ru" in html else "НЕ НАЙДЕН")
          print()
          
          btn_id = re.findall(r'<[^>]*id=["\']?open-b24-form["\']?[^>]*>', html)
          print(f"Кнопка #open-b24-form: {'НАЙДЕНА' if btn_id else 'НЕ НАЙДЕНА'}")
          for b in btn_id:
              print(f"  HTML: {b[:300]}")
          print()
          
          scripts = re.findall(r'<script[^>]*>(.*?)</script>', html, re.DOTALL)
          handler = [s for s in scripts if "open-b24-form" in s or "openForm" in s]
          print(f"Обработчик клика: {'НАЙДЕН' if handler else 'НЕ НАЙДЕН'}")
          for h in handler:
              print(h.strip()[:400])
          print()

          # Кнопки с href
          btns = re.findall(r'<a[^>]*>[\s\S]*?[Оо]ставить заявку[\s\S]*?</a>', html)
          print(f"Кнопок 'Оставить заявку': {len(btns)}")
          for i, b in enumerate(btns[:3]):
              clean = re.sub(r'\s+', ' ', b).strip()
              print(f"  [{i+1}] {clean[:300]}")

          print()
          print("=" * 50)
          print("ДИАГНОЗ:")
          if "loader_79" not in html:
              print("  ОШИБКА: скрипт Битрикс24 не загружается на странице!")
          elif not btn_id:
              print("  ОШИБКА: кнопка не опубликована в Elementor (нет id=open-b24-form)")
              print("  -> Нажмите ОПУБЛИКОВАТЬ в Elementor!")
          elif not handler:
              print("  ОШИБКА: нет обработчика клика в WPCode!")
          else:
              print("  Всё на месте. Проблема в порядке загрузки скриптов.")
              # Проверяем href
              for b in btns:
                  if "open-b24-form" in b:
                      if 'href="#"' in b:
                          print("  ПРИЧИНА СКРОЛЛА: href='#' — страница скроллится наверх!")
                          print("  РЕШЕНИЕ: поставить href='javascript:void(0)'")
          'PYEOF'
          else
            echo "СТРАНИЦА НЕ ЗАГРУЗИЛАСЬ (размер $SIZE байт)"
            echo "Сайт блокирует запросы от GitHub Actions (возможно Cloudflare)"
            cat page.html
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-analysis
          path: page.html
