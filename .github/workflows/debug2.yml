name: Debug B24 v3

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install puppeteer
      - name: Run debug
        run: node debug.js 2>&1 | tee debug2.txt || true
      - name: Commit
        if: always()
        run: |
          git config user.email "a@a.com"
          git config user.name "bot"
          git add debug2.txt
          git diff --staged --quiet || git commit -m "result"
          git push
