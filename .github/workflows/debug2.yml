name: Debug B24 v3

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install puppeteer
      - name: Write script
        run: |
          cat > debug.js << 'SCRIPTEOF'
const puppeteer = require('"'"'puppeteer'"'"');
const fs = require('"'"'fs'"'"');
(async () => {
  const browser = await puppeteer.launch({headless:true, args:['"'"'--no-sandbox'"'"','"'"'--disable-setuid-sandbox'"'"']});
  const page = await browser.newPage();
  const logs = [];
  const log = m => { process.stdout.write(String(m)+'"'"'\n'"'"'); logs.push(String(m)); };
  page.on('"'"'console'"'"', m => log('"'"'BROWSER: '"'"'+m.text()));
  page.on('"'"'pageerror'"'"', e => log('"'"'ERR: '"'"'+e.message));
  await page.setUserAgent('"'"'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'"'"');
  log('"'"'Loading page...'"'"');
  try {
    await page.goto('"'"'https://neva-teplohod.ru/'"'"', {waitUntil:'"'"'networkidle2'"'"', timeout:60000});
  } catch(e) { log('"'"'Goto error: '"'"'+e.message); }
  await new Promise(r=>setTimeout(r,5000));
  log('"'"'Page loaded'"'"');
  const r = await page.evaluate(() => {
    const btns = Array.from(document.querySelectorAll('"'"'a,button'"'"'))
      .filter(e=>(e.innerText||'"'"''"'"').trim().includes('"'"'\u041e\u0441\u0442\u0430\u0432\u0438\u0442\u044c \u0437\u0430\u044f\u0432\u043a\u0443'"'"'))
      .map(e=>({tag:e.tagName, href:e.getAttribute('"'"'href'"'"'), id:e.id, onclick:!!e.onclick, dataB24:e.getAttribute('"'"'data-b24-form'"'"'), classes:e.className.slice(0,80)}));
    const b24scripts = Array.from(document.querySelectorAll('"'"'script'"'"'))
      .map(s=>({dataB24:s.getAttribute('"'"'data-b24-form'"'"'), text:(s.textContent||'"'"''"'"').slice(0,300)}))
      .filter(s=>s.dataB24||(s.text.includes('"'"'b24form'"'"')&&s.text.includes('"'"'Оставить'"'"')));
    return {
      b24: typeof window.b24form,
      b24App: !!(window.b24form&&window.b24form.App),
      btns,
      b24scripts
    };
  });
  log('"'"'b24form type: '"'"'+r.b24+'"'"' | App: '"'"'+r.b24App);
  log('"'"'--- BUTTONS ('"'"'+r.btns.length+'"'"') ---'"'"');
  r.btns.forEach((b,i)=>log((i+1)+'"'"') '"'"'+JSON.stringify(b)));
  log('"'"'--- B24 SCRIPTS ('"'"'+r.b24scripts.length+'"'"') ---'"'"');
  r.b24scripts.forEach((s,i)=>log((i+1)+'"'"') dataB24='"'"'+s.dataB24+'"'"' text='"'"'+s.text.replace(/\n/g,'"'"' '"'"')));
  fs.writeFileSync('"'"'debug2.txt'"'"', logs.join('"'"'\n'"'"'));
  await browser.close();
})();

          SCRIPTEOF
      - name: Run script
        run: node debug.js 2>&1 | tee debug2.txt || true
      - name: Commit
        if: always()
        run: |
          git config user.email "a@a.com"
          git config user.name "bot"
          git add debug2.txt debug.js
          git diff --staged --quiet || git commit -m "debug3 $(date +%s)"
          git push
